<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>월별 추천 어종 지도</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f7fa; color: #202124; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .topbar { background: #fff; border-bottom: 1px solid #e5e7eb; z-index: 1000; box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04); }
        .month-nav { height: 62px; display: grid; grid-template-columns: 52px 1fr 52px; align-items: center; gap: 8px; padding: 8px 14px; }
        .nav-btn { border: 1px solid #d8dee7; background: #fff; color: #111827; width: 42px; height: 42px; border-radius: 50%; font-size: 22px; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.15s, background 0.15s, border-color 0.15s; }
        .nav-btn:hover { background: #f3f4f6; border-color: #9ca3af; }
        .nav-btn:active { transform: scale(0.96); }
        .month-title { text-align: center; }
        .month-number { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -0.04em; }
        .month-subtitle { margin-top: 4px; font-size: 12px; color: #6b7280; font-weight: 700; }
        .recommend-section { padding: 12px 16px 16px; border-top: 1px solid #f0f2f5; }
        .recommend-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
        .recommend-title { font-size: 15px; font-weight: 900; }
        .reset-btn { border: 0; background: #eef2ff; color: #3730a3; padding: 7px 10px; border-radius: 999px; font-size: 12px; font-weight: 800; cursor: pointer; }
        .species-strip { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
        .species-strip::-webkit-scrollbar { display: none; }
        .species-card { min-width: 136px; border: 1px solid #e5e7eb; background: #fff; border-radius: 16px; padding: 12px; cursor: pointer; box-shadow: 0 2px 5px rgba(15, 23, 42, 0.04); transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s; position: relative; overflow: hidden; text-align:left; }
        .species-card:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08); }
        .species-card.active { border-color: #111827; box-shadow: 0 0 0 2px #111827 inset; }
        .species-card.hot { border-color: #ef4444; background: #fff5f5; }
        .species-card.hot.active { box-shadow: 0 0 0 2px #ef4444 inset; }
        .species-name { font-size: 17px; font-weight: 900; margin-bottom: 7px; }
        .species-meta { font-size: 12px; color: #6b7280; font-weight: 700; margin-bottom: 10px; }
        .score-bar { width: 100%; height: 8px; background: #edf0f4; border-radius: 999px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 999px; background: #94a3b8; }
        .level-hot .score-fill { background: #ef4444; }
        .level-high .score-fill { background: #f97316; }
        .level-mid .score-fill { background: #eab308; }
        .level-low .score-fill { background: #84cc16; }
        .level-none .score-fill { background: #cbd5e1; }
        .content-wrapper { position: relative; flex: 1; overflow: hidden; min-height: 0; }
        #map { width: 100%; height: 100%; background: #e5e3df; z-index: 1; }
        .map-status { position: absolute; left: 14px; right: 14px; bottom: 14px; z-index: 500; background: rgba(255,255,255,0.94); border: 1px solid #e5e7eb; border-radius: 16px; padding: 12px 14px; box-shadow: 0 8px 24px rgba(15, 23, 42, 0.14); font-size: 13px; color: #374151; line-height: 1.45; pointer-events: none; }
        .map-status strong { color: #111827; }
        .pin-fab { position: absolute; right: 18px; bottom: 92px; z-index: 800; width: 58px; height: 58px; border-radius: 50%; border: 0; background: #ef4444; color: #fff; box-shadow: 0 12px 26px rgba(239, 68, 68, 0.35); font-size: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .pin-fab:active { transform: scale(0.96); }
        .toast { position: absolute; left: 50%; bottom: 164px; transform: translateX(-50%); z-index: 850; background: rgba(17,24,39,.94); color:#fff; padding: 10px 13px; border-radius: 999px; font-size: 13px; font-weight: 800; display:none; white-space: nowrap; }
        .toast.show { display:block; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.72); z-index: 9999; justify-content: center; align-items: center; padding: 20px; opacity: 0; transition: opacity 0.2s ease-in-out; }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #fff; width: 100%; max-width: 430px; border-radius: 18px; overflow: hidden; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-close { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.55); color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index:2; }
        .modal-img { width: 100%; max-height: 42vh; object-fit: contain; background: #000; display: block; }
        .modal-info { padding: 20px; }
        .modal-title { font-size: 19px; font-weight: 900; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: #666; line-height: 1.55; }
        .form-modal { max-height: 92vh; overflow-y: auto; }
        .form-head { padding: 18px 20px; border-bottom: 1px solid #eef0f4; }
        .form-title { font-size: 19px; font-weight: 950; }
        .form-subtitle { margin-top: 5px; font-size: 13px; color:#6b7280; line-height:1.4; }
        .log-form { padding: 18px 20px 20px; display: grid; gap: 12px; }
        .form-row { display:grid; gap: 7px; }
        .form-row label { font-size: 13px; font-weight: 900; color:#374151; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; border: 1px solid #d9dee7; border-radius: 12px; padding: 11px 12px; font: inherit; background:#fff; }
        .form-row textarea { min-height: 84px; resize: vertical; }
        .coords-grid { display:grid; grid-template-columns: 1fr 1fr; gap:10px; }
        .form-actions { display:flex; gap:10px; margin-top: 4px; }
        .primary-btn, .ghost-btn { flex:1; border:0; border-radius: 13px; padding: 12px 14px; font-weight: 900; cursor:pointer; }
        .primary-btn { background:#111827; color:#fff; }
        .ghost-btn { background:#f3f4f6; color:#111827; }
        .help-text { font-size: 12px; color:#6b7280; line-height:1.4; }
        @media (max-width: 768px) {
            body { height: 100dvh; }
            .month-nav { height: 58px; grid-template-columns: 46px 1fr 46px; padding: 8px 12px; }
            .nav-btn { width: 38px; height: 38px; font-size: 20px; }
            .month-number { font-size: 25px; }
            .recommend-section { padding: 10px 12px 12px; }
            .species-card { min-width: 126px; padding: 11px; }
            .map-status { left: 10px; right: 10px; bottom: 10px; font-size: 12px; padding-right: 70px; }
            .pin-fab { right: 14px; bottom: 88px; width: 54px; height: 54px; }
            .modal-overlay { padding: 12px; align-items: flex-end; }
            .modal-content { max-width: none; border-radius: 18px 18px 0 0; }
            .form-modal { max-height: 88vh; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="month-nav">
            <button class="nav-btn" id="prev-month" aria-label="이전 달">‹</button>
            <div class="month-title">
                <div class="month-number"><span id="current-month-label">6</span>월</div>
                <div class="month-subtitle" id="month-subtitle">이번 달 추천 어종</div>
            </div>
            <button class="nav-btn" id="next-month" aria-label="다음 달">›</button>
        </div>
        <section class="recommend-section">
            <div class="recommend-head">
                <div class="recommend-title" id="recommend-title">🔥 잘 잡히는 순서</div>
                <button class="reset-btn" id="show-all-btn">전체 보기</button>
            </div>
            <div class="species-strip" id="species-strip"></div>
        </section>
    </header>

    <main class="content-wrapper">
        <div id="map"></div>
        <button class="pin-fab" id="add-pin-btn" aria-label="현재 위치에 조과 기록 추가">📍</button>
        <div class="toast" id="toast"></div>
        <div class="map-status" id="map-status"></div>
    </main>

    <div id="log-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modal-img" class="modal-img" src="" alt="상세 사진" />
            <div class="modal-info">
                <div id="modal-title" class="modal-title"></div>
                <div id="modal-desc" class="modal-desc"></div>
            </div>
        </div>
    </div>

    <div id="add-modal" class="modal-overlay" onclick="cancelAddLog()">
        <div class="modal-content form-modal" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="cancelAddLog()">✕</button>
            <div class="form-head">
                <div class="form-title">새 조과 기록</div>
                <div class="form-subtitle">핀은 현재 위치에 생성됩니다. 지도를 탭하거나 핀을 드래그해서 위치를 조정할 수 있습니다.</div>
            </div>
            <form class="log-form" id="log-form">
                <div class="form-row">
                    <label for="species-input">대상 어종</label>
                    <select id="species-input" required></select>
                </div>
                <div class="form-row">
                    <label for="title-input">제목</label>
                    <input id="title-input" type="text" placeholder="예: 쏘가리 31cm" required />
                </div>
                <div class="coords-grid">
                    <div class="form-row">
                        <label for="size-input">사이즈(cm)</label>
                        <input id="size-input" type="number" min="0" step="0.1" placeholder="31" />
                    </div>
                    <div class="form-row">
                        <label for="place-input">장소명</label>
                        <input id="place-input" type="text" placeholder="남한강 포인트" />
                    </div>
                </div>
                <div class="form-row">
                    <label for="memo-input">내용</label>
                    <textarea id="memo-input" placeholder="채비, 수심, 시간대, 입질 패턴 등을 적어두세요."></textarea>
                </div>
                <div class="form-row">
                    <label for="tags-input">태그</label>
                    <input id="tags-input" type="text" placeholder="미노우, 여울, 해질녘" />
                    <div class="help-text">쉼표로 구분합니다. 저장 시 선택 어종은 자동으로 첫 태그에 들어갑니다.</div>
                </div>
                <div class="form-row">
                    <label for="photo-input">사진</label>
                    <input id="photo-input" type="file" accept="image/*" />
                    <div class="help-text">이 샘플은 서버 업로드 대신 브라우저 localStorage에 저장합니다.</div>
                </div>
                <div class="coords-grid">
                    <div class="form-row">
                        <label for="lat-input">위도</label>
                        <input id="lat-input" type="number" step="0.000001" required />
                    </div>
                    <div class="form-row">
                        <label for="lng-input">경도</label>
                        <input id="lng-input" type="number" step="0.000001" required />
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="ghost-btn" onclick="cancelAddLog()">취소</button>
                    <button type="submit" class="primary-btn">저장</button>
                </div>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const fishSeasonData = [
            { name: '배스', season: { 1: 25, 2: 35, 3: 60, 4: 90, 5: 100, 6: 90, 7: 70, 8: 65, 9: 80, 10: 85, 11: 55, 12: 30 } },
            { name: '붕어', season: { 1: 30, 2: 35, 3: 75, 4: 95, 5: 90, 6: 70, 7: 55, 8: 55, 9: 75, 10: 90, 11: 65, 12: 40 } },
            { name: '쏘가리', season: { 1: 10, 2: 15, 3: 35, 4: 65, 5: 90, 6: 100, 7: 85, 8: 70, 9: 80, 10: 60, 11: 25, 12: 10 } },
            { name: '가물치', season: { 1: 5, 2: 10, 3: 25, 4: 55, 5: 80, 6: 95, 7: 100, 8: 90, 9: 65, 10: 35, 11: 15, 12: 5 } },
            { name: '잉어', season: { 1: 20, 2: 25, 3: 45, 4: 70, 5: 85, 6: 80, 7: 65, 8: 60, 9: 75, 10: 80, 11: 50, 12: 25 } },
            { name: '메기', season: { 1: 5, 2: 10, 3: 20, 4: 45, 5: 70, 6: 90, 7: 100, 8: 95, 9: 75, 10: 45, 11: 20, 12: 5 } }
        ];

        let allLogs = [];
        let filteredLogs = [];
        const today = new Date();
        let selectedMonth = today.getMonth() + 1;
        let selectedSpecies = null;
        let draftMarker = null;
        let addMode = false;

        const map = L.map('map').setView([36.5, 127.8], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
        let markerGroup = L.featureGroup().addTo(map);

        const API_URL = 'https://mrdindoin.ddns.net/stsf/api/logs';
        const LOCAL_STORAGE_KEY = 'stsf_personal_logs';

        function getScoreLevel(score) {
            if (score >= 90) return { className: 'level-hot', label: '핫함' };
            if (score >= 70) return { className: 'level-high', label: '좋음' };
            if (score >= 50) return { className: 'level-mid', label: '보통' };
            if (score >= 30) return { className: 'level-low', label: '약함' };
            return { className: 'level-none', label: '비수기' };
        }
        function getSpeciesScore(speciesName, month = selectedMonth) {
            const item = fishSeasonData.find(fish => fish.name === speciesName);
            return item ? Number(item.season[month] || 0) : 0;
        }
        function getMonthlySpecies() {
            return fishSeasonData.map(fish => ({ ...fish, score: Number(fish.season[selectedMonth] || 0) })).sort((a, b) => b.score - a.score);
        }
        function renderMonthHeader() {
            document.getElementById('current-month-label').innerText = selectedMonth;
            const isThisMonth = selectedMonth === today.getMonth() + 1;
            document.getElementById('month-subtitle').innerText = isThisMonth ? '이번 달 추천 어종' : `${selectedMonth}월 추천 어종`;
            document.getElementById('recommend-title').innerText = `🔥 ${selectedMonth}월 잘 잡히는 순서`;
        }
        function renderSpeciesCards() {
            const strip = document.getElementById('species-strip');
            strip.innerHTML = '';
            getMonthlySpecies().forEach((fish, index) => {
                const level = getScoreLevel(fish.score);
                const card = document.createElement('button');
                card.type = 'button';
                card.className = `species-card ${level.className} ${fish.score >= 90 ? 'hot' : ''} ${selectedSpecies === fish.name ? 'active' : ''}`;
                card.innerHTML = `<div class="species-name">${index === 0 ? '🔥 ' : ''}${fish.name}</div><div class="species-meta">${level.label} · 제철도 ${fish.score}%</div><div class="score-bar"><div class="score-fill" style="width:${fish.score}%"></div></div>`;
                card.addEventListener('click', () => {
                    selectedSpecies = selectedSpecies === fish.name ? null : fish.name;
                    renderSpeciesCards();
                    applyCurrentFilter();
                });
                strip.appendChild(card);
            });
        }
        function populateSpeciesSelect() {
            const select = document.getElementById('species-input');
            select.innerHTML = fishSeasonData.map(fish => `<option value="${escapeHtml(fish.name)}">${escapeHtml(fish.name)}</option>`).join('');
        }
        function logMatchesSpecies(log, species) {
            if (!species) return true;
            return (log.tags && log.tags.includes(species)) || (log.species === species) || (log.title && log.title.includes(species));
        }
        function applyCurrentFilter() {
            filteredLogs = selectedSpecies ? allLogs.filter(log => logMatchesSpecies(log, selectedSpecies)) : allLogs;
            renderMarkers();
            updateMapStatus();
        }
        async function fetchLogs() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                allLogs = await response.json();
            } catch (error) {
                console.error('API Fetch Error:', error);
                allLogs = [
                    { id: 'sample-1', date: '2026-06-03 16:20', title: '배스 42cm', place: '충주호', tags: ['배스', '텍사스리그'], lat: 36.974, lng: 128.013, photo: '', memo: '샘플 데이터' },
                    { id: 'sample-2', date: '2026-06-03 05:45', title: '월척 붕어', place: '탄금호', tags: ['붕어'], lat: 37.012, lng: 127.899, photo: '', memo: '샘플 데이터' },
                    { id: 'sample-3', date: '2026-06-05 19:10', title: '쏘가리 31cm', place: '남한강', tags: ['쏘가리', '미노우'], lat: 37.087, lng: 127.799, photo: '', memo: '샘플 데이터' }
                ];
            }
            allLogs = [...loadLocalLogs(), ...allLogs].sort((a, b) => new Date(b.date) - new Date(a.date));
            renderMonthHeader();
            renderSpeciesCards();
            populateSpeciesSelect();
            applyCurrentFilter();
        }
        function loadLocalLogs() {
            try { return JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY) || '[]'); }
            catch { return []; }
        }
        function saveLocalLog(log) {
            const logs = loadLocalLogs();
            logs.unshift(log);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(logs));
        }
        async function postLogToServer(log) {
            // 실제 서버 저장 시 여기를 활성화하면 됩니다.
            // return fetch(API_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(log) });
            return Promise.resolve({ ok: true });
        }
        function renderMarkers() {
            markerGroup.clearLayers();
            filteredLogs.forEach(log => {
                if (log.lat && log.lng) {
                    const mainSpecies = log.species || (log.tags && log.tags[0]) || extractSpeciesFromTitle(log.title) || '';
                    const score = getSpeciesScore(mainSpecies);
                    const photoHtml = log.photo ? `<img src="${log.photo}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;" alt="조과 사진">` : '';
                    const sizeHtml = log.size ? `<br><span style="font-size:12px;color:#111827;font-weight:800;">📏 ${escapeHtml(log.size)}cm</span>` : '';
                    const popupContent = `<div style="min-width:180px;text-align:center;cursor:pointer;" onclick="openModal('${log.id}')">${photoHtml}<b style="display:block;font-size:14px;margin-bottom:4px;">${escapeHtml(log.title || '')}</b><span style="font-size:12px;color:#666;">📍 ${escapeHtml(log.place || '')}</span>${sizeHtml}<br><span style="font-size:12px;color:#ef4444;font-weight:800;">${selectedMonth}월 제철도 ${score}%</span></div>`;
                    const marker = L.marker([log.lat, log.lng]).bindPopup(popupContent, { minWidth: 180, maxWidth: 250 }).addTo(markerGroup);
                    log._marker = marker;
                }
            });
            if (markerGroup.getLayers().length > 0) map.fitBounds(markerGroup.getBounds(), { padding: [30, 30], maxZoom: 14 });
        }
        function updateMapStatus() {
            const status = document.getElementById('map-status');
            const label = selectedSpecies ? `<strong>${selectedSpecies}</strong>` : `<strong>${selectedMonth}월 추천 어종 전체</strong>`;
            const topFish = getMonthlySpecies()[0];
            const markerCount = markerGroup.getLayers().length;
            status.innerHTML = `${label} 기준으로 개인 조과 핀 <strong>${markerCount}</strong>개를 표시합니다.<br>오른쪽 아래 📍 버튼으로 현재 위치에 새 기록을 남길 수 있습니다.`;
        }
        function extractSpeciesFromTitle(title = '') {
            const found = fishSeasonData.find(fish => title.includes(fish.name));
            return found ? found.name : '';
        }
        function escapeHtml(value) {
            return String(value).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            clearTimeout(showToast.timer);
            showToast.timer = setTimeout(() => toast.classList.remove('show'), 2200);
        }
        function setDraftLatLng(latlng, moveMap = false) {
            if (!draftMarker) {
                draftMarker = L.marker(latlng, { draggable: true, opacity: 0.95 }).addTo(map);
                draftMarker.bindPopup('새 기록 위치<br>핀을 드래그하거나 지도를 탭하세요.').openPopup();
                draftMarker.on('dragend', () => setDraftLatLng(draftMarker.getLatLng(), false));
            } else {
                draftMarker.setLatLng(latlng);
            }
            document.getElementById('lat-input').value = Number(latlng.lat).toFixed(6);
            document.getElementById('lng-input').value = Number(latlng.lng).toFixed(6);
            if (moveMap) map.setView(latlng, Math.max(map.getZoom(), 15));
        }
        function startAddLog() {
            addMode = true;
            const select = document.getElementById('species-input');
            select.value = selectedSpecies || getMonthlySpecies()[0].name;
            document.getElementById('log-form').reset();
            select.value = selectedSpecies || getMonthlySpecies()[0].name;
            const defaultTitle = `${select.value} 기록`;
            document.getElementById('title-input').value = defaultTitle;
            showToast('현재 위치를 확인하는 중입니다');
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    pos => {
                        const latlng = L.latLng(pos.coords.latitude, pos.coords.longitude);
                        setDraftLatLng(latlng, true);
                        document.getElementById('add-modal').classList.add('show');
                        showToast('위치를 잡았습니다. 핀을 조정해도 됩니다');
                    },
                    () => {
                        const center = map.getCenter();
                        setDraftLatLng(center, false);
                        document.getElementById('add-modal').classList.add('show');
                        showToast('위치 권한이 없어 지도 중심에 핀을 놓았습니다');
                    },
                    { enableHighAccuracy: true, timeout: 7000, maximumAge: 60000 }
                );
            } else {
                setDraftLatLng(map.getCenter(), false);
                document.getElementById('add-modal').classList.add('show');
            }
        }
        window.cancelAddLog = function() {
            document.getElementById('add-modal').classList.remove('show');
            addMode = false;
            if (draftMarker) {
                map.removeLayer(draftMarker);
                draftMarker = null;
            }
        };
        async function fileToDataUrl(file) {
            if (!file) return '';
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }
        document.getElementById('log-form').addEventListener('submit', async event => {
            event.preventDefault();
            const species = document.getElementById('species-input').value;
            const extraTags = document.getElementById('tags-input').value.split(',').map(v => v.trim()).filter(Boolean);
            const tags = Array.from(new Set([species, ...extraTags]));
            const size = document.getElementById('size-input').value;
            const photo = await fileToDataUrl(document.getElementById('photo-input').files[0]);
            const now = new Date();
            const log = {
                id: `local-${Date.now()}`,
                date: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`,
                title: document.getElementById('title-input').value.trim(),
                species,
                size: size ? Number(size) : null,
                place: document.getElementById('place-input').value.trim() || '내 기록 위치',
                memo: document.getElementById('memo-input').value.trim(),
                tags,
                lat: Number(document.getElementById('lat-input').value),
                lng: Number(document.getElementById('lng-input').value),
                photo
            };
            saveLocalLog(log);
            await postLogToServer(log);
            allLogs.unshift(log);
            selectedSpecies = species;
            renderSpeciesCards();
            applyCurrentFilter();
            cancelAddLog();
            showToast('기록을 저장했습니다');
        });
        map.on('click', event => {
            if (!addMode) return;
            setDraftLatLng(event.latlng, false);
            showToast('핀 위치를 변경했습니다');
        });
        window.openModal = function(logId) {
            const log = allLogs.find(l => String(l.id) === String(logId));
            if (!log) return;
            const modalImg = document.getElementById('modal-img');
            modalImg.src = log.photo || '';
            modalImg.style.display = log.photo ? 'block' : 'none';
            const mainSpecies = log.species || (log.tags && log.tags[0]) || extractSpeciesFromTitle(log.title) || '';
            const score = getSpeciesScore(mainSpecies);
            const tags = (log.tags && log.tags.length > 0) ? `<br>🏷️ ${log.tags.map(escapeHtml).join(', ')}` : '';
            const size = log.size ? `<br>📏 ${escapeHtml(log.size)}cm` : '';
            const memo = log.memo ? `<br><br>${escapeHtml(log.memo).replace(/\n/g, '<br>')}` : '';
            document.getElementById('modal-title').innerText = log.title || '';
            document.getElementById('modal-desc').innerHTML = `📍 ${escapeHtml(log.place || '')}<br>📅 ${escapeHtml(log.date || '')}${size}<br>🔥 ${selectedMonth}월 제철도 ${score}%${tags}${memo}`;
            document.getElementById('log-modal').classList.add('show');
        };
        window.closeModal = function() { document.getElementById('log-modal').classList.remove('show'); };
        document.getElementById('prev-month').addEventListener('click', () => { selectedMonth = selectedMonth === 1 ? 12 : selectedMonth - 1; renderMonthHeader(); renderSpeciesCards(); applyCurrentFilter(); });
        document.getElementById('next-month').addEventListener('click', () => { selectedMonth = selectedMonth === 12 ? 1 : selectedMonth + 1; renderMonthHeader(); renderSpeciesCards(); applyCurrentFilter(); });
        document.getElementById('show-all-btn').addEventListener('click', () => { selectedSpecies = null; renderSpeciesCards(); applyCurrentFilter(); });
        document.getElementById('add-pin-btn').addEventListener('click', startAddLog);
        document.addEventListener('keydown', event => { if (event.key === 'Escape') { closeModal(); cancelAddLog(); } });
        fetchLogs();
    </script>
</body>
</html>

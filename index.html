<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>월별 추천 어종 지도 - 지도 중심</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            color: #202124;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: #fff;
            border-bottom: 1px solid #e5e7eb;
            z-index: 1000;
            box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
        }

        .month-nav {
            height: 62px;
            display: grid;
            grid-template-columns: 52px 1fr 52px;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
        }

        .nav-btn {
            border: 1px solid #d8dee7;
            background: #fff;
            color: #111827;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            font-size: 22px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, background 0.15s, border-color 0.15s;
        }
        .nav-btn:hover { background: #f3f4f6; border-color: #9ca3af; }
        .nav-btn:active { transform: scale(0.96); }

        .month-title { text-align: center; }
        .month-number { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -0.04em; }
        .month-subtitle { margin-top: 4px; font-size: 12px; color: #6b7280; font-weight: 700; }

        .recommend-section {
            padding: 12px 16px 16px;
            border-top: 1px solid #f0f2f5;
        }
        .recommend-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 10px;
        }
        .recommend-title { font-size: 15px; font-weight: 900; }
        .reset-btn {
            border: 0;
            background: #eef2ff;
            color: #3730a3;
            padding: 7px 10px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 800;
            cursor: pointer;
        }

        .species-strip {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 2px;
            scrollbar-width: none;
        }
        .species-strip::-webkit-scrollbar { display: none; }

        .species-card {
            min-width: 136px;
            border: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 16px;
            padding: 12px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(15, 23, 42, 0.04);
            transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
            position: relative;
            overflow: hidden;
        }
        .species-card:hover { transform: translateY(-1px); box-shadow: 0 6px 14px rgba(15, 23, 42, 0.08); }
        .species-card.active { border-color: #111827; box-shadow: 0 0 0 2px #111827 inset; }
        .species-card.hot { border-color: #ef4444; background: #fff5f5; }
        .species-card.hot.active { box-shadow: 0 0 0 2px #ef4444 inset; }

        .species-name { font-size: 17px; font-weight: 900; margin-bottom: 7px; }
        .species-meta { font-size: 12px; color: #6b7280; font-weight: 700; margin-bottom: 10px; }
        .score-bar { width: 100%; height: 8px; background: #edf0f4; border-radius: 999px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 999px; background: #94a3b8; }
        .level-hot .score-fill { background: #ef4444; }
        .level-high .score-fill { background: #f97316; }
        .level-mid .score-fill { background: #eab308; }
        .level-low .score-fill { background: #84cc16; }
        .level-none .score-fill { background: #cbd5e1; }

        .content-wrapper { position: relative; flex: 1; overflow: hidden; min-height: 0; }
        #map { width: 100%; height: 100%; background: #e5e3df; z-index: 1; }
        .map-status {
            position: absolute;
            left: 14px;
            right: 14px;
            bottom: 14px;
            z-index: 500;
            background: rgba(255,255,255,0.94);
            border: 1px solid #e5e7eb;
            border-radius: 16px;
            padding: 12px 14px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.14);
            font-size: 13px;
            color: #374151;
            line-height: 1.45;
            pointer-events: none;
        }
        .map-status strong { color: #111827; }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 9999;
            justify-content: center; align-items: center; padding: 20px;
            opacity: 0; transition: opacity 0.2s ease-in-out;
        }
        .modal-overlay.show { display: flex; opacity: 1; }
        .modal-content { background: #fff; width: 100%; max-width: 420px; border-radius: 18px; overflow: hidden; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .modal-close { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.55); color: #fff; border: none; width: 32px; height: 32px; border-radius: 50%; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .modal-img { width: 100%; max-height: 42vh; object-fit: contain; background: #000; display: block; }
        .modal-info { padding: 20px; }
        .modal-title { font-size: 19px; font-weight: 900; margin-bottom: 8px; }
        .modal-desc { font-size: 14px; color: #666; line-height: 1.55; }

        @media (max-width: 768px) {
            body { height: 100dvh; }
            .month-nav { height: 58px; grid-template-columns: 46px 1fr 46px; padding: 8px 12px; }
            .nav-btn { width: 38px; height: 38px; font-size: 20px; }
            .month-number { font-size: 25px; }
            .recommend-section { padding: 10px 12px 12px; }
            .species-card { min-width: 126px; padding: 11px; }
            .content-wrapper { min-height: 0; }
            .map-status { left: 10px; right: 10px; bottom: 10px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="month-nav">
            <button class="nav-btn" id="prev-month" aria-label="이전 달">‹</button>
            <div class="month-title">
                <div class="month-number"><span id="current-month-label">6</span>월</div>
                <div class="month-subtitle" id="month-subtitle">이번 달 추천 어종</div>
            </div>
            <button class="nav-btn" id="next-month" aria-label="다음 달">›</button>
        </div>
        <section class="recommend-section">
            <div class="recommend-head">
                <div class="recommend-title" id="recommend-title">🔥 잘 잡히는 순서</div>
                <button class="reset-btn" id="show-all-btn">전체 보기</button>
            </div>
            <div class="species-strip" id="species-strip"></div>
        </section>
    </header>

    <main class="content-wrapper">
        <div id="map"></div>
        <div class="map-status" id="map-status"></div>
    </main>

    <div id="log-modal" class="modal-overlay" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <img id="modal-img" class="modal-img" src="" alt="상세 사진" />
            <div class="modal-info">
                <div id="modal-title" class="modal-title"></div>
                <div id="modal-desc" class="modal-desc"></div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 이 데이터만 바꾸면 월별 추천 순서와 강조가 바뀝니다.
        const fishSeasonData = [
            { name: '배스', season: { 1: 25, 2: 35, 3: 60, 4: 90, 5: 100, 6: 90, 7: 70, 8: 65, 9: 80, 10: 85, 11: 55, 12: 30 } },
            { name: '붕어', season: { 1: 30, 2: 35, 3: 75, 4: 95, 5: 90, 6: 70, 7: 55, 8: 55, 9: 75, 10: 90, 11: 65, 12: 40 } },
            { name: '쏘가리', season: { 1: 10, 2: 15, 3: 35, 4: 65, 5: 90, 6: 100, 7: 85, 8: 70, 9: 80, 10: 60, 11: 25, 12: 10 } },
            { name: '가물치', season: { 1: 5, 2: 10, 3: 25, 4: 55, 5: 80, 6: 95, 7: 100, 8: 90, 9: 65, 10: 35, 11: 15, 12: 5 } },
            { name: '잉어', season: { 1: 20, 2: 25, 3: 45, 4: 70, 5: 85, 6: 80, 7: 65, 8: 60, 9: 75, 10: 80, 11: 50, 12: 25 } },
            { name: '메기', season: { 1: 5, 2: 10, 3: 20, 4: 45, 5: 70, 6: 90, 7: 100, 8: 95, 9: 75, 10: 45, 11: 20, 12: 5 } }
        ];

        let allLogs = [];
        let filteredLogs = [];
        const today = new Date();
        let selectedMonth = today.getMonth() + 1;
        let selectedSpecies = null;

        const map = L.map('map').setView([36.5, 127.8], 8);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);
        let markerGroup = L.featureGroup().addTo(map);

        const API_URL = 'https://mrdindoin.ddns.net/stsf/api/logs';

        function getScoreLevel(score) {
            if (score >= 90) return { className: 'level-hot', label: '핫함' };
            if (score >= 70) return { className: 'level-high', label: '좋음' };
            if (score >= 50) return { className: 'level-mid', label: '보통' };
            if (score >= 30) return { className: 'level-low', label: '약함' };
            return { className: 'level-none', label: '비수기' };
        }

        function getSpeciesScore(speciesName, month = selectedMonth) {
            const item = fishSeasonData.find(fish => fish.name === speciesName);
            return item ? Number(item.season[month] || 0) : 0;
        }

        function getMonthlySpecies() {
            return fishSeasonData
                .map(fish => ({ ...fish, score: Number(fish.season[selectedMonth] || 0) }))
                .sort((a, b) => b.score - a.score);
        }

        function renderMonthHeader() {
            document.getElementById('current-month-label').innerText = selectedMonth;
            const isThisMonth = selectedMonth === today.getMonth() + 1;
            document.getElementById('month-subtitle').innerText = isThisMonth ? '이번 달 추천 어종' : `${selectedMonth}월 추천 어종`;
            document.getElementById('recommend-title').innerText = `🔥 ${selectedMonth}월 잘 잡히는 순서`;
        }

        function renderSpeciesCards() {
            const strip = document.getElementById('species-strip');
            strip.innerHTML = '';
            getMonthlySpecies().forEach((fish, index) => {
                const level = getScoreLevel(fish.score);
                const card = document.createElement('button');
                card.type = 'button';
                card.className = `species-card ${level.className} ${fish.score >= 90 ? 'hot' : ''} ${selectedSpecies === fish.name ? 'active' : ''}`;
                card.innerHTML = `
                    <div class="species-name">${index === 0 ? '🔥 ' : ''}${fish.name}</div>
                    <div class="species-meta">${level.label} · 제철도 ${fish.score}%</div>
                    <div class="score-bar"><div class="score-fill" style="width:${fish.score}%"></div></div>
                `;
                card.addEventListener('click', () => {
                    selectedSpecies = selectedSpecies === fish.name ? null : fish.name;
                    renderSpeciesCards();
                    applyCurrentFilter();
                });
                strip.appendChild(card);
            });
        }

        function logMatchesSpecies(log, species) {
            if (!species) return true;
            return (log.tags && log.tags.includes(species)) || (log.title && log.title.includes(species));
        }

        function applyCurrentFilter() {
            filteredLogs = selectedSpecies ? allLogs.filter(log => logMatchesSpecies(log, selectedSpecies)) : allLogs;
            renderMarkers();
            updateMapStatus();
        }

        async function fetchLogs() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error('Network response was not ok');
                allLogs = await response.json();
                allLogs.sort((a, b) => new Date(b.date) - new Date(a.date));
            } catch (error) {
                console.error('API Fetch Error:', error);
                allLogs = [
                    { id: '1', date: '2026-06-03 16:20', title: '배스 42cm', place: '충주호', tags: ['배스', '텍사스리그'], lat: 36.974, lng: 128.013, photo: 'https://via.placeholder.com/300x200' },
                    { id: '2', date: '2026-06-03 05:45', title: '월척 붕어', place: '탄금호', tags: ['붕어'], lat: 37.012, lng: 127.899, photo: '' },
                    { id: '3', date: '2026-06-05 19:10', title: '쏘가리 31cm', place: '남한강', tags: ['쏘가리', '미노우'], lat: 37.087, lng: 127.799, photo: '' },
                    { id: '4', date: '2026-06-07 21:05', title: '메기 58cm', place: '금강', tags: ['메기'], lat: 36.452, lng: 127.121, photo: '' }
                ];
            }
            renderMonthHeader();
            renderSpeciesCards();
            applyCurrentFilter();
        }

        function renderMarkers() {
            markerGroup.clearLayers();
            filteredLogs.forEach(log => {
                if (log.lat && log.lng) {
                    const mainSpecies = (log.tags && log.tags[0]) || extractSpeciesFromTitle(log.title) || '';
                    const score = getSpeciesScore(mainSpecies);
                    const photoHtml = log.photo
                        ? `<img src="${log.photo}" style="width:100%;height:120px;object-fit:cover;border-radius:8px;margin-bottom:8px;" alt="조과 사진">`
                        : '';
                    const popupContent = `
                        <div style="min-width:180px;text-align:center;cursor:pointer;" onclick="openModal('${log.id}')">
                            ${photoHtml}
                            <b style="display:block;font-size:14px;margin-bottom:4px;">${escapeHtml(log.title || '')}</b>
                            <span style="font-size:12px;color:#666;">📍 ${escapeHtml(log.place || '')}</span><br>
                            <span style="font-size:12px;color:#ef4444;font-weight:800;">${selectedMonth}월 제철도 ${score}%</span>
                        </div>
                    `;
                    const marker = L.marker([log.lat, log.lng]).bindPopup(popupContent, { minWidth: 180, maxWidth: 250 }).addTo(markerGroup);
                    log._marker = marker;
                }
            });

            if (markerGroup.getLayers().length > 0) {
                map.fitBounds(markerGroup.getBounds(), { padding: [30, 30], maxZoom: 14 });
            }
        }

        function updateMapStatus() {
            const status = document.getElementById('map-status');
            const label = selectedSpecies ? `<strong>${selectedSpecies}</strong>` : `<strong>${selectedMonth}월 추천 어종 전체</strong>`;
            const topFish = getMonthlySpecies()[0];
            const markerCount = markerGroup.getLayers().length;
            status.innerHTML = `${label} 기준으로 개인 조과 핀 <strong>${markerCount}</strong>개를 표시합니다.<br>${selectedMonth}월 최고 추천은 <strong>${topFish.name}</strong>입니다. 어종 카드를 누르면 해당 어종 핀만 남습니다.`;
        }

        function extractSpeciesFromTitle(title = '') {
            const found = fishSeasonData.find(fish => title.includes(fish.name));
            return found ? found.name : '';
        }

        function escapeHtml(value) {
            return String(value)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        window.openModal = function(logId) {
            const log = allLogs.find(l => String(l.id) === String(logId));
            if (!log) return;
            const modalImg = document.getElementById('modal-img');
            modalImg.src = log.photo || '';
            modalImg.style.display = log.photo ? 'block' : 'none';
            const mainSpecies = (log.tags && log.tags[0]) || extractSpeciesFromTitle(log.title) || '';
            const score = getSpeciesScore(mainSpecies);
            const tags = (log.tags && log.tags.length > 0) ? `<br>🏷️ ${log.tags.map(escapeHtml).join(', ')}` : '';
            document.getElementById('modal-title').innerText = log.title || '';
            document.getElementById('modal-desc').innerHTML = `📍 ${escapeHtml(log.place || '')}<br>📅 ${escapeHtml(log.date || '')}<br>🔥 ${selectedMonth}월 제철도 ${score}%${tags}`;
            document.getElementById('log-modal').classList.add('show');
        };

        window.closeModal = function() {
            document.getElementById('log-modal').classList.remove('show');
        };

        document.getElementById('prev-month').addEventListener('click', () => {
            selectedMonth = selectedMonth === 1 ? 12 : selectedMonth - 1;
            renderMonthHeader();
            renderSpeciesCards();
            applyCurrentFilter();
        });

        document.getElementById('next-month').addEventListener('click', () => {
            selectedMonth = selectedMonth === 12 ? 1 : selectedMonth + 1;
            renderMonthHeader();
            renderSpeciesCards();
            applyCurrentFilter();
        });

        document.getElementById('show-all-btn').addEventListener('click', () => {
            selectedSpecies = null;
            renderSpeciesCards();
            applyCurrentFilter();
        });


        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') closeModal();
        });

        fetchLogs();
    </script>
</body>
</html>
